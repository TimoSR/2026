services:
  postgres:
    image: postgres:16
    container_name: cpp_learning_postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  mysql:
    image: mysql:8.4
    container_name: cpp_learning_mysql
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "53306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uapp", "-papp"]
      interval: 3s
      timeout: 3s
      retries: 30
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
