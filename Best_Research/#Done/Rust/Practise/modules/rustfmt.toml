unstable_features = true

# This is the setting that prevents collapsed/nested imports.
imports_granularity = "Item"

# Keep imports sorted alphabetically.
reorder_imports = true

# Keep your existing import grouping instead of forcing std/external/crate sections.
group_imports = "Preserve"

edition = "2024"
max_width = 200
tab_spaces = 4
hard_tabs = false

reorder_modules = true

fn_single_line = true
empty_item_single_line = true
