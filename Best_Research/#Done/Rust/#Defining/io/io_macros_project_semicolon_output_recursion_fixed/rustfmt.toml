# rustfmt.toml

unstable_features = true

edition = "2024"
style_edition = "2024"

max_width = 220
use_small_heuristics = "Max"

# Keep small function signatures compact, wrap larger ones.
fn_params_layout = "Tall"

# Also controls parenthesized, list-like macro invocations such as
# println!, writeln!, format!, vec!, and similar macros.
fn_call_width = 160

# Keep small struct literals on one line.
struct_lit_single_line = true
struct_lit_width = 80

format_strings = false

# Allman-style braces.
brace_style = "AlwaysNextLine"
control_brace_style = "AlwaysNextLine"

newline_style = "Unix"
hard_tabs = false
tab_spaces = 4

empty_item_single_line = true
